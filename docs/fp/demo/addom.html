<!DOCTYPE html>
<body>
<h2 id="hash">Computing hash...</h2>
<pre id="out"></pre>

<script>
// EDUCATIONAL ONLY – no tracking, storage, or network use.

async function complexMatrixTest() {
  const results = {};

  // 1. Complex 3D transformation chain
  const m3 = new DOMMatrixReadOnly()
    .translate(123.456789, -987.654321, 0.000123)
    .rotateAxisAngle(1, 1, 0.5, 123.456)
    .scale(1.000001, 0.999999, 1.234567)
    .skewX(12.345)
    .skewY(-9.876)
    .rotate(0.00001)
    .scale(99999.99999, 0.0000001, 3.1415926535);

  results.compound3D = Array.from(m3.toFloat64Array());

  // 2. Manual matrix multiplication
  const custom = new DOMMatrixReadOnly([
    1.0000001, 0.0000003, 0.0002, 0,
    0.0000004, 0.9999999, 0.0005, 0,
    0.0001,    0.0002,    1.0003, 0,
    0.1234567, -0.7654321, 0.00001, 1
  ]);

  const multiplied = m3.multiply(custom);
  results.multiplied = Array.from(multiplied.toFloat64Array());

  // 3. Inversion
  try {
    const inverted = multiplied.inverse();
    results.inverted = Array.from(inverted.toFloat64Array());
  } catch {
    results.inverted = "Matrix not invertible";
  }

  // 4. Determinant
  results.determinant = multiplied.determinant;

  // 5. Transform point
  const point = new DOMPoint(0.123456, -0.654321, 1.234567);
  const transformedPoint = point.matrixTransform(multiplied);
  results.transformedPoint = {
    x: transformedPoint.x,
    y: transformedPoint.y,
    z: transformedPoint.z,
    w: transformedPoint.w
  };

  // 6. Float32 vs Float64
  results.float32 = Array.from(multiplied.toFloat32Array());
  results.float64 = Array.from(multiplied.toFloat64Array());

  // 7. Extreme range stress test
  const extreme = new DOMMatrixReadOnly()
    .scale(1e-12, 1e12, -1e6)
    .rotateAxisAngle(0.000001, 999999, 0.5, 359.999999)
    .translate(1e-9, -1e9, 3.333333333e3);

  results.extreme = Array.from(extreme.toFloat64Array());

  // ---- Normalize numeric precision to 32 significant digits ----
  function normalize(obj) {
    if (Array.isArray(obj)) {
      return obj.map(normalize);
    }
    if (obj && typeof obj === "object") {
      const normalizedObj = {};
      for (const key of Object.keys(obj).sort()) {
        normalizedObj[key] = normalize(obj[key]);
      }
      return normalizedObj;
    }
    if (typeof obj === "number") {
      return Number(obj.toPrecision(32));
    }
    return obj;
  }

  const normalized = normalize(results);

  // ---- SHA-256 hash ----
  const encoder = new TextEncoder();
  const data = encoder.encode(JSON.stringify(normalized));
  const digest = await crypto.subtle.digest("SHA-256", data);

  const hashArray = Array.from(new Uint8Array(digest));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

  // Display results
  document.getElementById("hash").textContent =
    "Result Hash (SHA-256, 32-digit precision): " + hashHex;

  document.getElementById("out").textContent =
    JSON.stringify(normalized, null, 2);
}

complexMatrixTest();
</script>
</body>
