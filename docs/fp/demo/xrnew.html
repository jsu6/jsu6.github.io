<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robust XR Fingerprint</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; padding:20px; }
pre { white-space:pre-wrap; }
button { margin-bottom:10px; }
</style>
</head>
<body>

<h2>Robust XR-Only Fingerprint</h2>
<button id="run">Generate XR Fingerprint</button>
<pre id="output"></pre>

<script>
const output = document.getElementById("output");

function log(msg){ output.textContent += msg + "\n"; }

function hash(str){
  let h=0;
  for(let i=0;i<str.length;i++)
    h = Math.imul(31,h)+str.charCodeAt(i)|0;
  return (h>>>0).toString(16);
}

document.getElementById("run").onclick = async () => {

  output.textContent = "";

  if (!navigator.xr) {
    log("WebXR not available.");
    return;
  }

  const fp = [];

  //  Session mode support surface
  const modes = ["inline","immersive-vr","immersive-ar"];
  for (const mode of modes) {
    try {
      const supported = await navigator.xr.isSessionSupported(mode);
      fp.push("mode:"+mode+":"+supported);
    } catch {
      fp.push("mode:"+mode+":error");
    }
  }

  //  XR constructor surface
  const xrProps = Object.getOwnPropertyNames(Object.getPrototypeOf(navigator.xr));
  fp.push("xrProtoProps:"+xrProps.sort().join(","));

  //  XRRigidTransform math precision
  const t = new XRRigidTransform({x:1.1234567,y:2.7654321,z:3.3333333});
  const inv = t.inverse;
  fp.push("inverseExists:"+!!inv);
  if (inv) {
    const sample = Array.from(inv.matrix).slice(0,6).map(v=>v.toFixed(7));
    fp.push("invMatrixSample:"+sample.join(","));
  }

  //  Attempt inline session
  let session = null;
  try {
    session = await navigator.xr.requestSession("inline");
    fp.push("inlineSession:true");
  } catch {
    fp.push("inlineSession:false");
  }

  if (!session) {
    finalize();
    return;
  }

  //  Session prototype surface
  const sessionProps = Object.getOwnPropertyNames(Object.getPrototypeOf(session));
  fp.push("sessionProto:"+sessionProps.sort().join(","));

  //  Input sources baseline
  fp.push("inputSourceCount:"+session.inputSources.length);

  //  Reference space probing
  const refTypes = ["viewer","local","local-floor","bounded-floor"];
  for (const type of refTypes) {
    try {
      await session.requestReferenceSpace(type);
      fp.push("refSpace:"+type+":true");
    } catch {
      fp.push("refSpace:"+type+":false");
    }
  }

  //  Frame timing probe (safe timeout fallback)
  let frameCaptured = false;
  let start = performance.now();

  const timeout = setTimeout(()=>{
    if (!frameCaptured) {
      fp.push("frameCallback:false");
      finalize();
    }
  }, 1500);

  session.requestAnimationFrame((time, frame)=>{
    frameCaptured = true;
    clearTimeout(timeout);

    fp.push("frameCallback:true");
    fp.push("frameTimeDelta:"+(time-start).toFixed(3));

    finalize();
  });

  function finalize(){
    if (session) session.end();
    const material = fp.join("|");
    const finalHash = hash(material);

    log("=== XR Fingerprint Material ===");
    log(material);

    log("\n=== XR Fingerprint Hash ===");
    log(finalHash);
  }
};
</script>
</body>
</html>
