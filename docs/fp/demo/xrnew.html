<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XR-Only Fingerprint</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; padding:20px; }
pre { white-space:pre-wrap; }
button { margin-bottom:10px; }
</style>
</head>
<body>

<h2>XR-Only Fingerprint (Desktop Compatible)</h2>
<button id="run">Generate XR Fingerprint</button>
<pre id="output"></pre>

<script>
const output = document.getElementById("output");

function log(msg) {
  output.textContent += msg + "\n";
}

function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++)
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return (h >>> 0).toString(16);
}

document.getElementById("run").onclick = async () => {

  output.textContent = "";

  if (!navigator.xr) {
    log("WebXR not available.");
    return;
  }

  const fingerprint = [];

  // Session support surface
  const modes = ["inline", "immersive-vr", "immersive-ar"];
  for (const mode of modes) {
    try {
      const supported = await navigator.xr.isSessionSupported(mode);
      fingerprint.push("mode:" + mode + ":" + supported);
    } catch {
      fingerprint.push("mode:" + mode + ":error");
    }
  }

  const inlineSupported = await navigator.xr.isSessionSupported("inline");
  if (!inlineSupported) {
    log("Inline XR not supported.");
    return;
  }

  const session = await navigator.xr.requestSession("inline");

  // Input source baseline
  fingerprint.push("initialInputSources:" + session.inputSources.length);

  // Reference space probing
  const refTypes = ["viewer", "local", "local-floor", "bounded-floor"];
  for (const type of refTypes) {
    try {
      await session.requestReferenceSpace(type);
      fingerprint.push("refSpace:" + type + ":true");
    } catch {
      fingerprint.push("refSpace:" + type + ":false");
    }
  }

  const refSpace = await session.requestReferenceSpace("viewer");

  let frameCount = 0;
  const frameTimes = [];

  session.requestAnimationFrame(function onFrame(time, frame) {

    frameCount++;
    frameTimes.push(time);

    const pose = frame.getViewerPose(refSpace);

    if (pose) {

      // View count
      fingerprint.push("viewCount:" + pose.views.length);

      const view = pose.views[0];

      // Projection matrix precision sample
      const proj = Array.from(view.projectionMatrix).slice(0, 8);
      fingerprint.push("proj:" + proj.map(v => v.toFixed(5)).join(","));

      // Transform precision test
      const t = new XRRigidTransform();
      const inv = t.inverse;
      fingerprint.push("inverseExists:" + !!inv);

      if (inv) {
        fingerprint.push("invMatrixSample:" +
          Array.from(inv.matrix).slice(0,4).map(v => v.toFixed(5)).join(","));
      }
    }

    if (frameCount < 6) {
      session.requestAnimationFrame(onFrame);
    } else {

      // Frame interval analysis
      const deltas = [];
      for (let i = 1; i < frameTimes.length; i++) {
        deltas.push((frameTimes[i] - frameTimes[i-1]).toFixed(3));
      }

      fingerprint.push("frameDeltas:" + deltas.join(","));

      const material = fingerprint.join("|");
      const finalHash = hash(material);

      log("=== XR Fingerprint Material ===");
      log(material);

      log("\n=== XR Fingerprint Hash ===");
      log(finalHash);

      session.end();
    }
  });
};
</script>

</body>
</html>
