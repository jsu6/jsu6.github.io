<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adaptive WebXR Fingerprint</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; padding:20px; }
pre { white-space:pre-wrap; }
button { margin-bottom:10px; }
</style>
</head>
<body>

<h2>Adaptive WebXR Fingerprint</h2>
<button id="start">Start Fingerprint</button>
<pre id="output"></pre>

<script>
const output = document.getElementById("output");

function log(msg) {
  output.textContent += msg + "\n";
}

function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++)
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return (h >>> 0).toString(16);
}

async function detectSupportedFeatures() {
  const candidates = [
    "anchors",
    "hit-test",
    "depth-sensing",
    "plane-detection",
    "image-tracking"
  ];

  const supported = [];

  for (const feature of candidates) {
    try {
      const s = await navigator.xr.requestSession("immersive-ar", {
        requiredFeatures: [feature]
      });
      await s.end();
      supported.push(feature);
    } catch {}
  }

  return supported;
}

document.getElementById("start").onclick = async () => {

  if (!navigator.xr) {
    log("WebXR not supported.");
    return;
  }

  const arSupported = await navigator.xr.isSessionSupported("immersive-ar");
  if (!arSupported) {
    log("immersive-ar not supported.");
    return;
  }

  const supportedFeatures = await detectSupportedFeatures();
  log("Supported Features: " + supportedFeatures.join(", "));

  const session = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures: supportedFeatures
  });

  const fingerprint = [];

  fingerprint.push("features:" + supportedFeatures.join(","));

  // XRSession.inputSources
  fingerprint.push("initialInputCount:" + session.inputSources.length);

  session.addEventListener("inputsourceschange", (e) => {
    fingerprint.push("inputsAdded:" + e.added.length);
    fingerprint.push("inputsRemoved:" + e.removed.length);
    fingerprint.push("eventSession:" + !!e.session);
  });

  session.addEventListener("end", (e) => {
    fingerprint.push("endEventSession:" + !!e.session);
  });

  if (session.getTrackedImageScores) {
    try {
      const scores = await session.getTrackedImageScores();
      fingerprint.push("imageScores:" + scores.join(","));
    } catch {}
  }

  const refSpace = await session.requestReferenceSpace("local");

  session.requestAnimationFrame(function onFrame(time, frame) {

    const pose = frame.getViewerPose(refSpace);

    if (pose) {
      fingerprint.push("viewCount:" + pose.views.length);
    }

    // XRViewerPose.views
    if (pose && pose.views.length) {

      const view = pose.views[0];

      // Depth
      if (frame.getDepthInformation) {
        try {
          const depth = frame.getDepthInformation(view);
          if (depth) {
            fingerprint.push("rawValueToMeters:" + depth.rawValueToMeters);
          }
        } catch {}
      }

      // XRGPUSubImage
      if (frame.getViewSubImage) {
        try {
          const subImage = frame.getViewSubImage(view);
          fingerprint.push("hasColorTexture:" + !!subImage.colorTexture);

          if (subImage.getViewDescriptor) {
            const desc = subImage.getViewDescriptor();
            fingerprint.push("viewWidth:" + desc.width);
            fingerprint.push("viewHeight:" + desc.height);
          }
        } catch {}
      }
    }

    // Input sources
    for (const source of session.inputSources) {
      fingerprint.push("handedness:" + source.handedness);
      fingerprint.push("hasTargetRaySpace:" + !!source.targetRaySpace);
    }

    // Plane detection
    if (frame.detectedPlanes) {
      for (const plane of frame.detectedPlanes) {
        fingerprint.push("planeLastChanged:" + plane.lastChangedTime);
      }
    }

    // Anchors
    if (frame.createAnchor) {
      frame.createAnchor(new XRRigidTransform())
        .then(() => fingerprint.push("frameAnchor:true"))
        .catch(() => fingerprint.push("frameAnchor:false"));
    }

    // Hit test
    if (frame.getHitTestResults) {
      try {
        const hits = frame.getHitTestResults([]);
        fingerprint.push("hitCount:" + hits.length);
        for (const hit of hits) {
          if (hit.createAnchor) {
            hit.createAnchor()
              .then(() => fingerprint.push("hitAnchor:true"))
              .catch(() => fingerprint.push("hitAnchor:false"));
          }
        }
      } catch {}
    }

    // XRRigidTransform.inverse
    const t = new XRRigidTransform();
    fingerprint.push("inverseExists:" + !!t.inverse);

    // Image tracking
    if (frame.getImageTrackingResults) {
      const results = frame.getImageTrackingResults();
      for (const r of results) {
        fingerprint.push("imageIndex:" + r.index);
      }
    }

    setTimeout(() => {
      const material = fingerprint.join("|");
      const finalHash = hash(material);

      log("\n=== Fingerprint Material ===");
      log(material);

      log("\n=== Fingerprint Hash ===");
      log(finalHash);

      session.end();
    }, 1000);
  });
};
</script>

</body>
</html>
