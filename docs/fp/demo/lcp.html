<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LCP Fingerprint Sniffer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 2rem; }
        .data-card { border-left: 4px solid #bb86fc; background: #1e1e1e; padding: 1rem; margin: 10px 0; }
        .val { color: #03dac6; font-weight: bold; }
    </style>
</head>
<body>
    <h2>LCP Performance Fingerprint</h2>
    <div id="results">Waiting for LCP entry...</div>
    
    <div id="fingerprint-target-element" style="width: 80%; height: 200px; background: linear-gradient(45deg, #333, #444); margin-top: 50px;">
        (Largest Element)
    </div>

    <script>
        const observer = new PerformanceObserver((list) => {
            const entries = list.getEntries();
            const lastEntry = entries[entries.length - 1]; // Get the most recent LCP
            
            document.getElementById('results').innerHTML = `
                <div class="data-card">
                    <p>Element ID: <span class="val">${lastEntry.id || 'None'}</span></p>
                    <p>Render Size (Area): <span class="val">${lastEntry.size}px²</span></p>
                    <p>Load Time: <span class="val">${lastEntry.loadTime.toFixed(2)}ms</span></p>
                    <p>Element Tag: <span class="val">${lastEntry.element ? lastEntry.element.tagName : 'N/A'}</span></p>
                </div>
            `;
            
            console.log("LCP Fingerprint Data:", lastEntry);
        });

        // Start observing for 'largest-contentful-paint' entries
        observer.observe({ type: 'largest-contentful-paint', buffered: true });
    </script>
</body>
</html>
