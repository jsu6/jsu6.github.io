<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Engine Differential Stress Test</title>
<style>
  body { font-family: monospace; background:#111; color:#0f0; padding:20px; }
  h1 { color:#fff; }
  pre { white-space:pre-wrap; word-break:break-word; }
  .section { margin-bottom:20px; }
</style>
</head>
<body>

<h1>SVG Engine Differential Output</h1>
<div id="output"></div>

<script>
(function(){

const svgNS = "http://www.w3.org/2000/svg";
const results = {};

function addSection(title, data){
  const container = document.getElementById("output");
  const div = document.createElement("div");
  div.className = "section";
  const h = document.createElement("h2");
  h.textContent = title;
  const pre = document.createElement("pre");
  pre.textContent = JSON.stringify(data, null, 2);
  div.appendChild(h);
  div.appendChild(pre);
  container.appendChild(div);
}

function record(name, value){
  results[name] = value;
}

// --- Create SVG root with fractional viewport ---
const svg = document.createElementNS(svgNS, "svg");
svg.setAttribute("width", "333.333");
svg.setAttribute("height", "222.222");
svg.setAttribute("viewBox", "0 0 333.333 222.222");
document.body.appendChild(svg);

// -------------------------------------------------
// 1. Nested Transform Stack Stress
// -------------------------------------------------
const group = document.createElementNS(svgNS, "g");
group.setAttribute("transform",
  "translate(10.1234,20.5678) rotate(13.37) scale(1.1111,0.9999)");
svg.appendChild(group);

const rect = document.createElementNS(svgNS, "rect");
rect.setAttribute("x","5.5555555");
rect.setAttribute("y","9.9999999");
rect.setAttribute("width","123.456789");
rect.setAttribute("height","45.6789123");
rect.setAttribute("fill","red");
rect.setAttribute("tabindex","0");
group.appendChild(rect);

// getBBox after transforms
const bbox = rect.getBBox();
record("transformed_getBBox", bbox);

// getScreenCTM matrix precision
const ctm = rect.getScreenCTM();
record("screenCTM", {
  a: ctm.a, b: ctm.b, c: ctm.c,
  d: ctm.d, e: ctm.e, f: ctm.f
});

// -------------------------------------------------
// 2. createSVGPoint + Matrix Transform
// -------------------------------------------------
const pt = svg.createSVGPoint();
pt.x = Math.PI * 100;
pt.y = Math.E * 100;

const transformedPt = pt.matrixTransform(ctm);

record("matrixTransformedPoint", {
  x: transformedPt.x,
  y: transformedPt.y
});

// -------------------------------------------------
// 3. Text Layout Differential
// -------------------------------------------------
const text = document.createElementNS(svgNS,"text");
text.setAttribute("x","0");
text.setAttribute("y","150.123");
text.setAttribute("font-family","Arial, Times New Roman, serif");
text.setAttribute("font-size","17.3333");
text.textContent = "ffi AVA 𝛑 Ω ﬂ";
svg.appendChild(text);

const textBBox = text.getBBox();
record("text_getBBox", textBBox);

// Character-level metrics
let charMetrics = [];
for (let i=0;i<text.textContent.length;i++){
  try{
    const extent = text.getExtentOfChar(i);
    charMetrics.push({
      i,
      x: extent.x,
      y: extent.y,
      width: extent.width,
      height: extent.height
    });
  } catch(e){
    charMetrics.push({i, error:true});
  }
}
record("text_char_extents", charMetrics);

// -------------------------------------------------
// 4. Clipping & Filter Interaction
// -------------------------------------------------
const defs = document.createElementNS(svgNS,"defs");

const clip = document.createElementNS(svgNS,"clipPath");
clip.setAttribute("id","clipTest");

const clipRect = document.createElementNS(svgNS,"rect");
clipRect.setAttribute("x","20.222");
clipRect.setAttribute("y","20.333");
clipRect.setAttribute("width","50.444");
clipRect.setAttribute("height","50.555");

clip.appendChild(clipRect);
defs.appendChild(clip);

const filter = document.createElementNS(svgNS,"filter");
filter.setAttribute("id","blurTest");

const feGaussian = document.createElementNS(svgNS,"feGaussianBlur");
feGaussian.setAttribute("stdDeviation","0.3333");
filter.appendChild(feGaussian);

defs.appendChild(filter);
svg.appendChild(defs);

rect.setAttribute("clip-path","url(#clipTest)");
rect.setAttribute("filter","url(#blurTest)");

const postEffectBBox = rect.getBBox();
record("post_clip_filter_getBBox", postEffectBBox);

// -------------------------------------------------
// 5. ForeignObject Layout Interaction
// -------------------------------------------------
const foreign = document.createElementNS(svgNS,"foreignObject");
foreign.setAttribute("x","200.1111");
foreign.setAttribute("y","33.2222");
foreign.setAttribute("width","100");
foreign.setAttribute("height","50");

const div = document.createElement("div");
div.style.fontFamily = "Arial";
div.style.fontSize = "13.777px";
div.textContent = "Layout test Ω≈ç√";

foreign.appendChild(div);
svg.appendChild(foreign);

record("foreignObject_y_baseVal", foreign.y.baseVal.value);

// -------------------------------------------------
// 6. Focus Behavior Edge Case
// -------------------------------------------------
rect.focus();
record("focus_state", {
  activeTag: document.activeElement.tagName,
  isRectFocused: document.activeElement === rect
});

// -------------------------------------------------
// 7. Float Stress Loop (ULP Sensitivity)
// -------------------------------------------------
let floatAccum = 0;
for (let i=0;i<10000;i++){
  floatAccum += Math.sin(i) * Math.cos(i);
}
record("float_accumulator", floatAccum);

// -------------------------------------------------
// Output
// -------------------------------------------------
for (const key in results){
  addSection(key, results[key]);
}

})();
</script>

</body>
</html>
