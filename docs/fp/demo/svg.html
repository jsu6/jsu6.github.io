<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SVG Geometry Entropy Study</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 20px;
  }

  #svgContainer {
    width: 70%;
    resize: horizontal;
    overflow: auto;
    border: 2px solid #333;
    padding: 10px;
  }

  svg {
    width: 100%;
    height: 350px;
    border: 1px solid #aaa;
    background: #f9f9f9;
  }

  #log {
    margin-top: 20px;
    font-family: monospace;
    white-space: pre-wrap;
    background: #f4f4f4;
    padding: 12px;
    max-height: 400px;
    overflow: auto;
  }
</style>
</head>
<body>

<h2>SVG Geometry Entropy Measurement</h2>
<p>
This page collects SVG layout measurements for academic entropy analysis.
Resize the container or change zoom level to compare outputs.
</p>

<div id="svgContainer">
  <svg id="mysvg" viewBox="0 0 600 350">
    <rect id="rectA"
          x="73.3333"
          y="91.7777"
          width="213.5555"
          height="147.4444"
          fill="steelblue"
          tabindex="0"/>
    
    <foreignObject id="foreignA"
                   x="310.2222"
                   y="127.8888"
                   width="220.3333"
                   height="120.6666">
      <div xmlns="http://www.w3.org/1999/xhtml"
           style="font-size:17.3333px;
                  line-height:1.2345;
                  padding:3.14159px;
                  font-family: system-ui, serif;">
        Entropy Probe Ω≈ç√∫˜µ≤≥÷
      </div>
    </foreignObject>
  </svg>
</div>

<button id="run">Collect Measurements</button>

<h3>Measurement Vector</h3>
<div id="log"></div>

<script>
const svg = document.getElementById("mysvg");
const rect = document.getElementById("rectA");
const foreign = document.getElementById("foreignA");
const log = document.getElementById("log");

function collectMeasurements() {
  // 1. getBBox() geometry
  const bbox = rect.getBBox();

  // 2. SVGRect.y via bbox
  const rectY = bbox.y;

  // 3. SVGForeignObjectElement.y
  const foreignY = foreign.y.baseVal.value;

  // 4. createSVGPoint + screen CTM transform
  const point = svg.createSVGPoint();
  point.x = 123.4567;
  point.y = 234.5678;

  const ctm = svg.getScreenCTM();
  const transformed = point.matrixTransform(ctm);

  // 5. Focus behavior measurement
  rect.focus();
  const focused = document.activeElement === rect;

  // 6. ResizeObserver contentRect
  const ro = new ResizeObserver(entries => {
    const entry = entries[0];

    const result = {
      devicePixelRatio: window.devicePixelRatio,
      svgContentWidth: entry.contentRect.width,
      svgContentHeight: entry.contentRect.height,
      rectBBox: {
        x: bbox.x,
        y: bbox.y,
        width: bbox.width,
        height: bbox.height
      },
      rectY: rectY,
      foreignObjectY: foreignY,
      transformedPoint: {
        x: transformed.x,
        y: transformed.y
      },
      focusState: focused
    };

    log.textContent = JSON.stringify(result, null, 2);
    ro.disconnect();
  });

  ro.observe(svg);
}

document.getElementById("run").addEventListener("click", collectMeasurements);
</script>

</body>
</html>
