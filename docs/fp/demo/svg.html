<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Differential Research Harness</title>
<style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
    h1 { color: #fff; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .section { margin-bottom: 20px; }
</style>
</head>
<body>

<h1>SVG Fingerprinting Differential Output</h1>
<div id="output"></div>

<script>
(function () {

    const svgNS = "http://www.w3.org/2000/svg";
    const results = {};

    function addSection(title, data) {
        const container = document.getElementById("output");
        const section = document.createElement("div");
        section.className = "section";

        const heading = document.createElement("h2");
        heading.textContent = title;

        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(data, null, 2);

        section.appendChild(heading);
        section.appendChild(pre);
        container.appendChild(section);
    }

    // ---- SVG ROOT ----
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("width", "300");
    svg.setAttribute("height", "200");
    document.body.appendChild(svg);

    // ---- createSVGPoint Precision ----
    const point = svg.createSVGPoint();
    point.x = Math.PI;
    point.y = Math.E;

    results.createSVGPoint = {
        x_raw: point.x,
        y_raw: point.y,
        x_string: point.x.toString(),
        y_string: point.y.toString()
    };

    // ---- SVG Rect ----
    const rect = document.createElementNS(svgNS, "rect");
    rect.setAttribute("x", "10.123456789");
    rect.setAttribute("y", "20.987654321");
    rect.setAttribute("width", "100.0000001");
    rect.setAttribute("height", "50.0000001");
    rect.setAttribute("fill", "red");
    rect.setAttribute("tabindex", "0");

    svg.appendChild(rect);

    results.SVGRect_y = {
        baseVal: rect.y.baseVal.value,
        animVal: rect.y.animVal.value
    };

    // ---- getBBox ----
    const bbox = rect.getBBox();

    results.getBBox = {
        x: bbox.x,
        y: bbox.y,
        width: bbox.width,
        height: bbox.height
    };

    // ---- getScreenCTM Matrix Precision ----
    const ctm = rect.getScreenCTM();
    results.getScreenCTM = {
        a: ctm.a,
        b: ctm.b,
        c: ctm.c,
        d: ctm.d,
        e: ctm.e,
        f: ctm.f
    };

    // ---- ForeignObject ----
    const foreign = document.createElementNS(svgNS, "foreignObject");
    foreign.setAttribute("x", "5.5555555");
    foreign.setAttribute("y", "15.3333333");
    foreign.setAttribute("width", "100");
    foreign.setAttribute("height", "50");

    const div = document.createElement("div");
    div.textContent = "Test";
    div.style.fontFamily = "Arial";
    div.style.fontSize = "16px";

    foreign.appendChild(div);
    svg.appendChild(foreign);

    results.SVGForeignObject_y = {
        baseVal: foreign.y.baseVal.value,
        animVal: foreign.y.animVal.value
    };

    // ---- Focus Behavior ----
    rect.focus();
    results.focus = {
        activeElementTag: document.activeElement.tagName,
        isRectFocused: document.activeElement === rect
    };

    // ---- Float Rounding Differential ----
    const floatTest = 0.1 + 0.2;
    results.floatPrecision = {
        "0.1+0.2": floatTest,
        equalityToPoint3: floatTest === 0.3
    };

    // ---- Serialized SVG Output ----
    const serializer = new XMLSerializer();
    results.serializedSVG = serializer.serializeToString(svg);

    // ---- Display All Results ----
    for (const key in results) {
        addSection(key, results[key]);
    }

})();
</script>

</body>
</html>
