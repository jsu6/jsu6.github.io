<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG Differential Probe</title>
</head>
<body>
<script>
(function () {
    function collectSVGSignals() {
        const results = {};

        // --- Create SVG Root ---
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("width", "300");
        svg.setAttribute("height", "200");
        document.body.appendChild(svg);

        // --- createSVGPoint ---
        const point = svg.createSVGPoint();
        point.x = Math.PI;
        point.y = Math.E;

        results.createSVGPoint_precision = {
            x: point.x,
            y: point.y
        };

        // --- SVG Rect ---
        const rect = document.createElementNS(svgNS, "rect");
        rect.setAttribute("x", "10.123456789");
        rect.setAttribute("y", "20.987654321");
        rect.setAttribute("width", "100.0000001");
        rect.setAttribute("height", "50.0000001");
        svg.appendChild(rect);

        // Access baseVal.y precision
        results.SVGRect_y_baseVal = rect.y.baseVal.value;

        // --- getBBox ---
        const bbox = rect.getBBox();
        results.getBBox = {
            x: bbox.x,
            y: bbox.y,
            width: bbox.width,
            height: bbox.height
        };

        // --- ForeignObject ---
        const foreign = document.createElementNS(svgNS, "foreignObject");
        foreign.setAttribute("x", "5.5555555");
        foreign.setAttribute("y", "15.3333333");
        foreign.setAttribute("width", "100");
        foreign.setAttribute("height", "50");

        const div = document.createElement("div");
        div.textContent = "Test";
        div.style.fontFamily = "Arial";
        foreign.appendChild(div);

        svg.appendChild(foreign);

        results.SVGForeignObject_y_baseVal = foreign.y.baseVal.value;

        // --- Focus behavior ---
        rect.setAttribute("tabindex", "0");
        rect.focus();
        results.focusedElement = document.activeElement === rect;

        return results;
    }

    const output = collectSVGSignals();
    console.log("SVG Differential Signals:", output);
})();
</script>
</body>
</html>
