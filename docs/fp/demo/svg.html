<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVG API Differential Display Harness</title>
<style>
    body { font-family: monospace; white-space: pre-wrap; }
    .section { margin-bottom: 30px; }
    .header { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="output"></div>

<script>
(function () {

    const svgNS = "http://www.w3.org/2000/svg";
    const output = document.getElementById("output");

    function writeSection(title, data) {
        const div = document.createElement("div");
        div.className = "section";
        div.innerHTML = "<div class='header'>" + title + "</div>" +
                        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
        output.appendChild(div);
    }

    function enumerateAll(obj) {
        const props = {};
        let current = obj;

        while (current) {
            Object.getOwnPropertyNames(current).forEach(name => {
                if (!props[name]) {
                    try {
                        props[name] = {
                            type: typeof obj[name],
                            value: safeRead(obj[name]),
                            descriptor: Object.getOwnPropertyDescriptor(current, name)
                        };
                    } catch (e) {
                        props[name] = { error: e.toString() };
                    }
                }
            });
            current = Object.getPrototypeOf(current);
        }

        return props;
    }

    function safeRead(value) {
        try {
            if (typeof value === "function") return "[Function]";
            if (typeof value === "object" && value !== null)
                return Object.prototype.toString.call(value);
            return value;
        } catch (e) {
            return "Unreadable";
        }
    }

    function floatVariants(num) {
        return {
            raw: num,
            toString: num.toString(),
            toFixed_20: num.toFixed(20),
            toPrecision_21: num.toPrecision(21),
            json: JSON.stringify(num)
        };
    }

    // --- SVG ROOT ---
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("width", "300");
    svg.setAttribute("height", "200");
    document.body.appendChild(svg);

    writeSection("SVGSVGElement Prototype Chain", enumerateAll(svg));

    // --- createSVGPoint ---
    const point = svg.createSVGPoint();
    point.x = Math.PI;
    point.y = Math.E;

    writeSection("createSVGPoint Object Enumeration", enumerateAll(point));
    writeSection("createSVGPoint Float Precision", {
        x: floatVariants(point.x),
        y: floatVariants(point.y)
    });

    // --- SVGRect ---
    const rect = document.createElementNS(svgNS, "rect");
    rect.setAttribute("x", "10.123456789");
    rect.setAttribute("y", "20.987654321");
    rect.setAttribute("width", "100.0000001");
    rect.setAttribute("height", "50.0000001");
    rect.setAttribute("tabindex", "0");
    svg.appendChild(rect);

    writeSection("SVGRect Full Enumeration", enumerateAll(rect));

    writeSection("SVGRect BaseVal Precision", {
        x: floatVariants(rect.x.baseVal.value),
        y: floatVariants(rect.y.baseVal.value),
        width: floatVariants(rect.width.baseVal.value),
        height: floatVariants(rect.height.baseVal.value)
    });

    // --- getBBox ---
    const bbox = rect.getBBox();
    writeSection("getBBox Enumeration", enumerateAll(bbox));
    writeSection("getBBox Precision", {
        x: floatVariants(bbox.x),
        y: floatVariants(bbox.y),
        width: floatVariants(bbox.width),
        height: floatVariants(bbox.height)
    });

    // --- ForeignObject ---
    const foreign = document.createElementNS(svgNS, "foreignObject");
    foreign.setAttribute("x", "5.5555555");
    foreign.setAttribute("y", "15.3333333");
    foreign.setAttribute("width", "100");
    foreign.setAttribute("height", "50");

    const div = document.createElement("div");
    div.textContent = "ForeignObject Test";
    div.style.fontFamily = "Arial";
    foreign.appendChild(div);
    svg.appendChild(foreign);

    writeSection("SVGForeignObject Enumeration", enumerateAll(foreign));

    writeSection("SVGForeignObject BaseVal Precision", {
        x: floatVariants(foreign.x.baseVal.value),
        y: floatVariants(foreign.y.baseVal.value)
    });

    // --- Focus Behavior ---
    rect.focus();
    writeSection("Focus State", {
        activeElementTag: document.activeElement.tagName,
        isRectFocused: document.activeElement === rect
    });

    // --- Feature Detection ---
    writeSection("Feature Detection", {
        has_focusForBindings: typeof rect.focusForBindings === "function",
        has_getBBoxFromJavascript: typeof rect.getBBoxFromJavascript === "function"
    });

})();
</script>
</body>
</html>
