<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gamepad Fingerprinting PoC</title>
<style>
  body { font-family: monospace; padding: 20px; }
  button { margin: 6px 6px 6px 0; }
  pre { background: #111; color: #0f0; padding: 15px; white-space: pre-wrap; }
</style>
</head>
<body>

<h2>Gamepad Fingerprinting PoC</h2>
<p>Connect a controller and press any button before running.</p>

<button onclick="runGamepadFingerprint()">Run Gamepad Fingerprint</button>
<pre id="out">Waiting...</pre>

<script>
const out = document.getElementById("out");

function print(obj) {
  out.textContent = JSON.stringify(obj, null, 2);
}

async function sha256(str) {
  const data = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/* Measure timestamp resolution & jitter */
async function measureTimestamp(gamepad, samples = 50) {
  const timestamps = [];
  const deltas = [];

  for (let i = 0; i < samples; i++) {
    const gp = navigator.getGamepads()[gamepad.index];
    if (!gp) break;

    timestamps.push(gp.timestamp);

    if (i > 0) {
      deltas.push(gp.timestamp - timestamps[i - 1]);
    }

    await new Promise(r => requestAnimationFrame(r));
  }

  return {
    first: timestamps[0],
    last: timestamps[timestamps.length - 1],
    deltas: deltas,
    minDelta: Math.min(...deltas),
    maxDelta: Math.max(...deltas)
  };
}

/* Measure axis precision */
function axisPrecision(axes) {
  return axes.map(a => {
    const str = a.toString();
    const decimals = str.includes(".") ? str.split(".")[1].length : 0;
    return decimals;
  });
}

/* Measure button analog precision */
function buttonPrecision(buttons) {
  return buttons.map(b => {
    const str = b.value.toString();
    const decimals = str.includes(".") ? str.split(".")[1].length : 0;
    return decimals;
  });
}

async function runGamepadFingerprint() {

  const gamepads = navigator.getGamepads();
  const result = {
    userAgent: navigator.userAgent,
    platform: navigator.platform,
    gamepads: []
  };

  for (const gp of gamepads) {
    if (!gp) continue;

    const entry = {
      id: gp.id,
      index: gp.index,
      mapping: gp.mapping,
      connected: gp.connected,
      axesCount: gp.axes.length,
      buttonsCount: gp.buttons.length,
      axisPrecision: axisPrecision(gp.axes),
      buttonPrecision: buttonPrecision(gp.buttons)
    };

    entry.timestampAnalysis = await measureTimestamp(gp);

    result.gamepads.push(entry);
  }

  result.hash = await sha256(JSON.stringify(result));

  print(result);
}

/* Optional: detect connect/disconnect */
window.addEventListener("gamepadconnected", e => {
  console.log("Gamepad connected:", e.gamepad.id);
});

window.addEventListener("gamepaddisconnected", e => {
  console.log("Gamepad disconnected:", e.gamepad.id);
});
</script>

</body>
</html>
