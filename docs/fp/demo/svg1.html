<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced SVG API Fingerprinting</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        #hash-display { font-size: 1.8rem; border: 2px solid #333; padding: 20px; text-align: center; margin-bottom: 20px; color: #ffcc00; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background: #333; color: #fff; }
        .diff { color: #ff6666; font-weight: bold; }
        #target-svg { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG Entropy Probe</h1>
    <div id="hash-display">Calculating Signature...</div>

    <table>
        <thead>
            <tr>
                <th>API / Property</th>
                <th>Result (High Precision)</th>
            </tr>
        </thead>
        <tbody id="results"></tbody>
    </table>
</div>

<div id="target-svg">
    <svg id="probe-svg" width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <path id="complex-path" d="M10,10 C20,100 200,100 250,10 S200,250 10,250" fill="none" stroke="black" />
        
        <text id="complex-text" x="15.55" y="50.77" font-family="serif" font-size="24.123">
            BrowserQuirk_123!@#
        </text>

        <foreignObject id="probe-fo" x="5.1" y="80.9" width="150.5" height="50.5">
            <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 12.5px; border: 1px solid red;">
                Probe
            </div>
        </foreignObject>

        <g id="transform-group" transform="matrix(1.1, 0.2, -0.2, 1.1, 10.5, 20.3)">
            <rect id="test-rect" x="2.5" y="2.5" width="20.1" height="20.1" />
        </g>
    </svg>
</div>

<script>
    async function runProbe() {
        const svg = document.getElementById('probe-svg');
        const path = document.getElementById('complex-path');
        const text = document.getElementById('complex-text');
        const fo = document.getElementById('probe-fo');
        const rect = document.getElementById('test-rect');
        const resultsTable = document.getElementById('results');

        const metrics = {};

        // 1. SVGGraphicsElement.getBBox (on complex path)
        const pathBox = path.getBBox();
        metrics['Path.getBBox'] = `${pathBox.width},${pathBox.height},${pathBox.x}`;

        // 2. SVGGraphicsElement.getBBox (on text - high entropy)
        const textBox = text.getBBox();
        metrics['Text.getBBox'] = `${textBox.width},${textBox.height}`;

        // 3. SVGRect.y (Direct property access)
        metrics['SVGRect.y'] = rect.y.baseVal.value;

        // 4. SVGForeignObjectElement.y
        metrics['SVGForeignObjectElement.y'] = fo.y.baseVal.value;

        // 5. SVGSVGElement.createSVGPoint (Coordinate behavior)
        const pt = svg.createSVGPoint();
        metrics['SVGPoint Init'] = `x:${pt.x},y:${pt.y}`;

        // 6. SVGElement.focus (Binding/Support test)
        metrics['SVGElement.focus'] = typeof svg.focus;

        // 7. NEW: getScreenCTM (Matrix math - highly device dependent)
        const matrix = svg.getScreenCTM();
        metrics['SVG.getScreenCTM'] = matrix ? `${matrix.a},${matrix.d},${matrix.e}` : 'null';

        // 8. NEW: getComputedStyle for SVG (Internal CSS engine quirks)
        const style = window.getComputedStyle(text);
        metrics['Text.ComputedFontSize'] = style.fontSize;

        // Display results
        let entropyString = "";
        for (let [key, val] of Object.entries(metrics)) {
            entropyString += val;
            const row = `<tr><td>${key}</td><td class="api-value">${val}</td></tr>`;
            resultsTable.innerHTML += row;
        }

        // Generate Hash
        const hash = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(entropyString))
            .then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join(''));
        
        document.getElementById('hash-display').textContent = `ID: ${hash.substring(0, 20).toUpperCase()}`;
    }

    window.onload = runProbe;
</script>
</body>
</html>
