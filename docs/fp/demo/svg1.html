<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG API Fingerprint PoC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #1a1a1a; color: #e0e0e0; }
        .container { max-width: 900px; margin: auto; }
        .result-card { background: #2d2d2d; border: 1px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .api-name { color: #569cd6; font-weight: bold; font-family: monospace; }
        .api-value { color: #ce9178; word-break: break-all; font-family: monospace; }
        h1 { color: #4ec9b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #444; }
        th { color: #9cdcfe; }
        #fingerprint-hash { font-size: 1.5rem; color: #dcdcaa; font-weight: bold; padding: 20px; text-align: center; border: 2px dashed #444; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG API Entropy Collector</h1>
    <div id="fingerprint-hash">Generating Unique Signature...</div>

    <table>
        <thead>
            <tr>
                <th>Target API / Property</th>
                <th>Observed Value (High Precision)</th>
            </tr>
        </thead>
        <tbody id="results-body">
            </tbody>
    </table>
</div>

<div id="svg-container" style="position: absolute; top: -9999px; left: -9999px;">
    <svg id="test-svg" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
        <rect id="test-rect" x="10.12345" y="20.6789" width="50" height="50" />
        <foreignObject id="test-fo" x="0" y="45.54321" width="100" height="100">
            <div xmlns="http://www.w3.org/1999/xhtml">Probe</div>
        </foreignObject>
        <circle id="test-circle" cx="50" cy="50" r="40" />
    </svg>
</div>

<script>
    function getFingerprint() {
        const svg = document.getElementById('test-svg');
        const rect = document.getElementById('test-rect');
        const fo = document.getElementById('test-fo');
        const circle = document.getElementById('test-circle');

        const data = {};

        // 1. SVGSVGElement.createSVGPoint
        // Checks how the browser initializes point objects
        const pt = svg.createSVGPoint();
        data['SVGSVGElement.createSVGPoint'] = `x:${pt.x}, y:${pt.y}`;

        // 2. SVGGraphicsElement.getBBox
        // This is the "heavy lifter" for fingerprinting. 
        // It measures the exact rendering box of the circle.
        const bbox = circle.getBBox();
        data['SVGGraphicsElement.getBBox'] = `w:${bbox.width}, h:${bbox.height}, x:${bbox.x}, y:${bbox.y}`;

        // 3. SVGRect.y
        // Captures the raw attribute value from the rect element
        data['SVGRect.y'] = rect.y.baseVal.value;

        // 4. SVGForeignObjectElement.y
        // Different engines handle the coordinate systems of embedded HTML differently
        data['SVGForeignObjectElement.y'] = fo.y.baseVal.value;

        // 5. SVGElement.focus (Availability/Binding check)
        // Checks if the focus method is available and its binding type
        data['SVGElement.focus'] = typeof svg.focus === 'function' ? 'Available' : 'Unavailable';

        displayResults(data);
    }

    function displayResults(data) {
        const tbody = document.getElementById('results-body');
        let combinedString = "";

        for (const [api, value] of Object.entries(data)) {
            combinedString += value;
            const row = `<tr>
                <td class="api-name">${api}</td>
                <td class="api-value">${value}</td>
            </tr>`;
            tbody.innerHTML += row;
        }

        // Simple hash to show uniqueness
        const hash = btoa(combinedString).substring(0, 16);
        document.getElementById('fingerprint-hash').textContent = "Browser Signature: " + hash;
    }

    window.onload = getFingerprint;
</script>

</body>
</html>
