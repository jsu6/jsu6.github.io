<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media API Fingerprinting PoC</title>
<style>
  body { font-family: monospace; padding: 20px; }
  button { margin: 6px 6px 6px 0; }
  pre { background: #111; color: #0f0; padding: 15px; white-space: pre-wrap; }
</style>
</head>
<body>

<h2>Media API Fingerprint PoC</h2>

<button onclick="runAll()">Run Media Fingerprint</button>
<pre id="out">Click button to run</pre>

<script>
const out = document.getElementById("out");

function print(obj) {
  out.textContent = JSON.stringify(obj, null, 2);
}

async function sha256(str) {
  const data = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/* -------------------------------------------------- */
/* 1. MediaKeySystemAccess.getConfiguration() */
/* -------------------------------------------------- */
async function probeEME() {
  const systems = [
    "com.widevine.alpha",
    "com.microsoft.playready",
    "com.apple.fps.1_0"
  ];

  const result = {};

  for (const ks of systems) {
    try {
      const config = [{
        initDataTypes: ["cenc"],
        audioCapabilities: [{
          contentType: 'audio/mp4; codecs="mp4a.40.2"'
        }],
        videoCapabilities: [{
          contentType: 'video/mp4; codecs="avc1.640028"',
          robustness: "SW_SECURE_DECODE"
        }],
        persistentState: "optional",
        distinctiveIdentifier: "optional"
      }];

      const access = await navigator.requestMediaKeySystemAccess(ks, config);
      result[ks] = access.getConfiguration();
    } catch (e) {
      result[ks] = "unsupported";
    }
  }

  return result;
}

/* -------------------------------------------------- */
/* 2. MediaList.length */
/* -------------------------------------------------- */
function probeMediaList() {
  const list = document.styleSheets[0]?.media;
  if (!list) return "no-stylesheet-media";

  return {
    mediaText: list.mediaText,
    length: list.length
  };
}

/* -------------------------------------------------- */
/* 3. MediaSource.addSourceBuffer() */
/* -------------------------------------------------- */
function probeMSE() {
  const codecs = [
    'video/mp4; codecs="avc1.640028"',
    'video/mp4; codecs="hev1.1.6.L93.B0"',
    'video/webm; codecs="vp09.00.51.08"',
    'video/webm; codecs="av01.0.05M.08"'
  ];

  const support = {};

  for (const type of codecs) {
    support[type] = MediaSource.isTypeSupported(type);
  }

  return support;
}

/* -------------------------------------------------- */
/* 4–7. MediaStream & Stats */
/* -------------------------------------------------- */
async function probeMediaStream() {
  const data = {};

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: true
    });

    /* MediaStream.getVideoTracks */
    const videoTracks = stream.getVideoTracks();
    data.videoTrackCount = videoTracks.length;
    data.videoTracks = videoTracks.map(t => ({
      id: t.id,
      label: t.label,
      settings: t.getSettings(),
      capabilities: t.getCapabilities?.()
    }));

    /* MediaStreamTrackEvent.track */
    const trackEventInfo = {};
    stream.addEventListener("addtrack", e => {
      trackEventInfo.kind = e.track.kind;
      trackEventInfo.id = e.track.id;
    });
    data.trackEvent = trackEventInfo;

    /* RTCPeerConnection stats (deliveredFrames / totalFrames equivalent) */
    const pc = new RTCPeerConnection();
    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    const stats = await pc.getStats();
    const statSummary = [];

    stats.forEach(report => {
      if (report.type === "outbound-rtp" || report.type === "track") {
        statSummary.push({
          type: report.type,
          framesSent: report.framesSent,
          framesEncoded: report.framesEncoded,
          totalSamplesSent: report.totalSamplesSent
        });
      }
    });

    data.rtcStats = statSummary;

    stream.getTracks().forEach(t => t.stop());
    pc.close();

  } catch (e) {
    data.error = e.message;
  }

  return data;
}

/* -------------------------------------------------- */
/* Run Everything */
/* -------------------------------------------------- */
async function runAll() {

  const fingerprint = {};

  fingerprint.userAgent = navigator.userAgent;
  fingerprint.platform = navigator.platform;

  fingerprint.eme = await probeEME();
  fingerprint.mediaList = probeMediaList();
  fingerprint.mse = probeMSE();
  fingerprint.mediaStream = await probeMediaStream();

  fingerprint.hash = await sha256(JSON.stringify(fingerprint));

  print(fingerprint);
}

</script>

<style>
@media screen and (min-width: 800px) {
  body { background: #222; }
}
</style>

</body>
</html>
