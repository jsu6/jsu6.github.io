<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Animation API Fingerprinting PoC</title>
<style>
  body { font-family: monospace; padding: 20px; }
  #box {
    width: 100px;
    height: 100px;
    background: red;
    position: relative;
  }
  #box::before {
    content: "";
    position: absolute;
    width: 50px;
    height: 50px;
    background: blue;
    top: 0;
    left: 0;
  }
  pre {
    background: #111;
    color: #0f0;
    padding: 15px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<h2>Animation Fingerprint PoC</h2>
<button onclick="run()">Run Animation Fingerprint</button>
<div id="box"></div>
<pre id="out">Click Run</pre>

<script>
const out = document.getElementById("out");
const box = document.getElementById("box");

function print(obj) {
  out.textContent = JSON.stringify(obj, null, 2);
}

async function sha256(str) {
  const data = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/*  Composite mode probe */
function probeCompositeSupport() {
  const modes = ["replace", "add", "accumulate"];
  const results = {};

  for (const mode of modes) {
    try {
      const effect = new KeyframeEffect(
        box,
        [{ transform: "translateX(0px)" },
         { transform: "translateX(10px)" }],
        { duration: 10, composite: mode }
      );
      results[mode] = effect.composite;
    } catch (e) {
      results[mode] = "unsupported";
    }
  }

  return results;
}

/*  commitStyles rendering math differences */
async function probeCommitStyles() {
  const anim = box.animate(
    [
      { transform: "translateX(0.1px)" },
      { transform: "translateX(10.3px)" }
    ],
    { duration: 50, fill: "forwards" }
  );

  await anim.finished;

  anim.commitStyles();
  anim.cancel();

  const computed = getComputedStyle(box).transform;

  return computed;
}

/*  startTime precision */
async function probeStartTimePrecision() {
  const anim = box.animate(
    [{ opacity: 0 }, { opacity: 1 }],
    { duration: 100 }
  );

  const startTime = anim.startTime;

  await new Promise(r => setTimeout(r, 20));

  const currentTime = anim.currentTime;
  anim.cancel();

  return {
    startTime,
    currentTime,
    precision: startTime % 1
  };
}

/*  pseudoElement animation support */
function probePseudoElement() {
  try {
    const effect = new KeyframeEffect(
      box,
      [{ transform: "translateX(0px)" },
       { transform: "translateX(20px)" }],
      { duration: 10 },
      "::before"
    );
    return effect.pseudoElement;
  } catch (e) {
    return "unsupported";
  }
}

/*  AnimationEvent.pseudoElement */
function probeAnimationEvent() {
  return new Promise(resolve => {
    box.addEventListener("animationend", e => {
      resolve({
        pseudoElement: e.pseudoElement,
        elapsedTime: e.elapsedTime
      });
    }, { once: true });

    box.style.animation = "testanim 0.05s";
  });
}

/* Inject CSS animation */
const style = document.createElement("style");
style.textContent = `
@keyframes testanim {
  from { opacity: 0; }
  to { opacity: 1; }
}`;
document.head.appendChild(style);

async function run() {

  const fingerprint = {};

  fingerprint.userAgent = navigator.userAgent;
  fingerprint.platform = navigator.platform;

  fingerprint.compositeModes = probeCompositeSupport();
  fingerprint.commitStylesMatrix = await probeCommitStyles();
  fingerprint.startTimeData = await probeStartTimePrecision();
  fingerprint.pseudoElementSupport = probePseudoElement();
  fingerprint.animationEvent = await probeAnimationEvent();

  fingerprint.hash = await sha256(JSON.stringify(fingerprint));

  print(fingerprint);
}

</script>

</body>
</html>
