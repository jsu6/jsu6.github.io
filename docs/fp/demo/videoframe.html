<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VideoFrame Fingerprint Demo</title>
<style>
body { font-family: monospace; background:#111; color:#0f0; padding:20px; }
pre { white-space: pre-wrap; }
button { margin-bottom: 10px; }
</style>
</head>
<body>

<h2>VideoFrame Fingerprint Demonstration</h2>
<button id="run">Generate Fingerprint</button>
<pre id="output"></pre>

<script>
const output = document.getElementById("output");

function log(data) {
  output.textContent += data + "\n";
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return (h >>> 0).toString(16);
}

async function testResolution(width, height) {
  const canvas = new OffscreenCanvas(width, height);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);

  const start = performance.now();
  const frame = new VideoFrame(canvas, { timestamp: 0 });
  const end = performance.now();

  const result = {
    requestedWidth: width,
    requestedHeight: height,
    codedWidth: frame.codedWidth,
    codedHeight: frame.codedHeight,
    displayWidth: frame.displayWidth,
    displayHeight: frame.displayHeight,
    alignmentDeltaHeight: frame.codedHeight - height,
    allocationTimeMs: +(end - start).toFixed(4)
  };

  frame.close();
  return result;
}

document.getElementById("run").addEventListener("click", async () => {

  output.textContent = "";

  if (typeof VideoFrame === "undefined") {
    log("VideoFrame not supported.");
    return;
  }

  const testResolutions = [
    [641, 359],
    [853, 479],
    [1023, 767],
    [1281, 721],
    [1919, 1079]
  ];

  const results = [];

  for (const [w, h] of testResolutions) {
    const r = await testResolution(w, h);
    results.push(r);
  }

  log("=== Raw Results ===");
  log(JSON.stringify(results, null, 2));

  // Build fingerprint material
  const fingerprintMaterial = results.map(r =>
    [
      r.codedHeight,
      r.displayWidth,
      r.alignmentDeltaHeight,
      r.allocationTimeMs
    ].join(":")
  ).join("|");

  const fingerprint = simpleHash(fingerprintMaterial);

  log("\n=== Fingerprint Material ===");
  log(fingerprintMaterial);

  log("\n=== Derived Fingerprint Hash ===");
  log(fingerprint);
});
</script>

</body>
</html>
